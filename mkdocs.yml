site_name: BOOMER
site_description: Bayesian OWL Ontology MErgER - Probabilistic reasoning for ontology alignment
site_author: Chris Mungall
repo_url: https://github.com/monarch-initiative/boomer-py

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - Data Model: datamodel.md
    - Data Formats: formats.md
    - Probability Tables: ptables.md
    - Reasoning: reasoning.md
    - Search: search.md
    - Partitioning: partitioning.md
    - Grid Search: grid-search.md
    - Ontology Conversion: ontology-conversion.md
    - Evaluation: evaluation.md
    - Datasets: datasets.md
  - Command Line Interface: cli.md
  - API Reference:
    - Model: api/model.md
    - Search: api/search.md
    - Reasoners: api/reasoners.md
    - Renderers: api/renderers.md
    - IO: api/io.md
    - CLI: api/cli.md
  - Examples: examples.md
  - Tutorials:
    - Basic: tutorial/basic-tutorial.ipynb
    - Ontology Alignment: tutorial/ontology-alignment.ipynb
    - Evaluation: tutorial/evaluation-tutorial.ipynb
  - Contributing: contributing.md

plugins:
  - search
  - mknotebooks:
      execute: false

